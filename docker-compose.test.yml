services:
  celesverse-test-db:
    image: postgres:17
    container_name: celesverse-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: celesverse
      POSTGRES_PASSWORD: celesverse_test
      POSTGRES_DB: celesverse_test
    ports:
      - "55432:5432"
    volumes:
      - celesverse-test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celesverse -d celesverse_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  celesverse-test-db-data:
